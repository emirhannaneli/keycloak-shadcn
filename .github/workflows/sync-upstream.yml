name: sync-upstream
on:
    schedule:
        # Every Monday at 09:00 UTC
        - cron: '0 9 * * 1'
    workflow_dispatch: # manual trigger from Actions tab

permissions:
    contents: write
    pull-requests: write

jobs:
    sync:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Configure git author
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

            - name: Sync upstream
              id: sync
              run: |
                  git remote add upstream https://github.com/keycloakify/keycloakify-starter.git
                  git fetch upstream main

                  COMMITS=$(git rev-list HEAD..upstream/main --count)
                  echo "commits=$COMMITS" >> "$GITHUB_OUTPUT"
                  echo "[sync-upstream] $COMMITS commit(s) ahead in upstream"

                  if [ "$COMMITS" = "0" ]; then
                      echo "Already up to date — skipping branch + PR creation"
                      exit 0
                  fi

                  BRANCH="sync-upstream-$(date -u +%Y%m%d)"
                  echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

                  # If a sync branch from today already exists on origin, just reuse it.
                  # peter-evans-style behavior: don't error on existing remote branch.
                  git checkout -B "$BRANCH"

                  if git merge upstream/main --no-edit -m "Sync upstream keycloakify/keycloakify-starter"; then
                      echo "conflicts=false" >> "$GITHUB_OUTPUT"
                      echo "[sync-upstream] Clean merge"
                  else
                      echo "conflicts=true" >> "$GITHUB_OUTPUT"
                      echo "[sync-upstream] Merge conflicts — committing with markers for manual resolution"
                      # Stage everything, including files with conflict markers
                      git add -A
                      git commit -m "Sync upstream (CONFLICTS — manual resolution needed)"
                  fi

                  git push --force origin "$BRANCH"

            - name: Create or update PR
              if: steps.sync.outputs.commits != '0' && steps.sync.outputs.commits != ''
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  BRANCH: ${{ steps.sync.outputs.branch }}
                  CONFLICTS: ${{ steps.sync.outputs.conflicts }}
                  COMMITS: ${{ steps.sync.outputs.commits }}
              run: |
                  set -euo pipefail

                  if [ "$CONFLICTS" = "true" ]; then
                      STATUS_LINE="⚠️ **Conflicts detected.** Files contain merge markers (\`<<<<<<<\`, \`=======\`, \`>>>>>>>\`). Review each conflict and resolve before merging."
                  else
                      STATUS_LINE="✅ Clean merge — no conflicts."
                  fi

                  BODY=$(cat <<EOF
                  ## Automated upstream sync

                  Pulled $COMMITS commit(s) from [keycloakify/keycloakify-starter](https://github.com/keycloakify/keycloakify-starter)'s \`main\` branch.

                  $STATUS_LINE

                  ### Review checklist

                  - [ ] Read the diff for breaking changes (especially \`kc.gen.tsx\`, \`KcContext.ts\`, theme generator updates)
                  - [ ] Resolve any conflicts in the working tree, if applicable
                  - [ ] Run \`npm run build-keycloak-theme\` locally to verify the build passes
                  - [ ] Test login / register / account pages render correctly with the new generator output

                  ### Notes

                  - This PR was opened by \`.github/workflows/sync-upstream.yml\` running on a weekly schedule (Monday 09:00 UTC) and can be triggered manually from the Actions tab.
                  - Created with the default \`GITHUB_TOKEN\` — the standard CI workflow will NOT run on this PR. Run the build locally or trigger CI manually after merging.
                  EOF
                  )

                  # Check whether a PR already exists for this branch
                  EXISTING=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number // empty')

                  if [ -n "$EXISTING" ]; then
                      echo "[sync-upstream] Updating existing PR #$EXISTING"
                      gh pr edit "$EXISTING" --title "Sync upstream keycloakify/keycloakify-starter" --body "$BODY"
                  else
                      echo "[sync-upstream] Creating new PR"
                      gh pr create \
                          --base main \
                          --head "$BRANCH" \
                          --title "Sync upstream keycloakify/keycloakify-starter" \
                          --body "$BODY" \
                          --label "upstream-sync,automated" || \
                      gh pr create \
                          --base main \
                          --head "$BRANCH" \
                          --title "Sync upstream keycloakify/keycloakify-starter" \
                          --body "$BODY"
                  fi
