name: sync-upstream
on:
    schedule:
        # Every Monday at 09:00 UTC
        - cron: '0 9 * * 1'
    workflow_dispatch: # manual trigger from Actions tab

permissions:
    contents: read
    issues: write

jobs:
    notify:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Compare with upstream
              id: cmp
              run: |
                  git remote add upstream https://github.com/keycloakify/keycloakify-starter.git
                  # depth=200 is enough for the "last 20 commits" diff list below
                  git fetch upstream main --depth=200 --no-tags || git fetch upstream main --no-tags

                  COMMITS=$(git rev-list HEAD..upstream/main --count || echo 0)
                  echo "commits=$COMMITS" >> "$GITHUB_OUTPUT"
                  echo "[sync-upstream] $COMMITS commit(s) ahead in upstream"

                  if [ "$COMMITS" = "0" ]; then
                      echo "Up to date — will close tracking issue if open"
                      exit 0
                  fi

                  {
                      echo "commit_list<<COMMITS_EOF"
                      git log HEAD..upstream/main --oneline --max-count=20 || echo "(failed to list)"
                      echo "COMMITS_EOF"
                  } >> "$GITHUB_OUTPUT"

            - name: Create or update tracking issue
              if: steps.cmp.outputs.commits != '0' && steps.cmp.outputs.commits != ''
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  COMMITS: ${{ steps.cmp.outputs.commits }}
                  COMMIT_LIST: ${{ steps.cmp.outputs.commit_list }}
              run: |
                  set -euo pipefail

                  TITLE="📡 Upstream tracking: $COMMITS commit(s) ahead in keycloakify-starter"

                  BODY=$(cat <<EOF
                  ## Upstream activity report

                  [keycloakify/keycloakify-starter](https://github.com/keycloakify/keycloakify-starter) is **$COMMITS commit(s)** ahead of our \`main\`.

                  ### Recent upstream commits (latest 20)

                  \`\`\`
                  $COMMIT_LIST
                  \`\`\`

                  ### What to do

                  This repo started from \`keycloakify-starter\` as a template, not as a fork. Updates do NOT auto-merge — your customizations (pages, components, SPI, theme colors) stay intact.

                  To pull in upstream improvements:

                  - **Dependency updates** (e.g. \`keycloakify\` npm version bump): wait for the Dependabot PR.
                  - **Auto-generated files** (\`src/kc.gen.tsx\`, \`KcContext.ts\`): run \`npx keycloakify update-kc-gen\` after a dep update.
                  - **Translations**: run \`npx keycloakify update-kc-messages\` if new keys are needed.
                  - **Other interesting changes**: review the commit list above and cherry-pick what applies.

                  ---

                  *Auto-generated by \`.github/workflows/sync-upstream.yml\` every Monday 09:00 UTC. Closes itself automatically when 0 commits ahead.*
                  EOF
                  )

                  EXISTING=$(gh issue list --state open --search "📡 Upstream tracking in:title" --json number --jq '.[0].number // empty')

                  if [ -n "$EXISTING" ]; then
                      echo "[sync-upstream] Updating existing tracking issue #$EXISTING"
                      gh issue edit "$EXISTING" --title "$TITLE" --body "$BODY"
                  else
                      echo "[sync-upstream] Creating new tracking issue"
                      gh issue create --title "$TITLE" --body "$BODY" --label "upstream-tracking" 2>/dev/null \
                          || gh issue create --title "$TITLE" --body "$BODY"
                  fi

            - name: Close tracking issue if up to date
              if: steps.cmp.outputs.commits == '0'
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  EXISTING=$(gh issue list --state open --search "📡 Upstream tracking in:title" --json number --jq '.[0].number // empty')
                  if [ -n "$EXISTING" ]; then
                      echo "[sync-upstream] Closing tracking issue #$EXISTING — up to date"
                      gh issue close "$EXISTING" --comment "Now up to date with upstream."
                  else
                      echo "[sync-upstream] No tracking issue open and 0 commits ahead — nothing to do"
                  fi
