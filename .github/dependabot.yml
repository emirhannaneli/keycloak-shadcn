version: 2
updates:
    # Theme + tooling — npm packages including keycloakify itself
    - package-ecosystem: "npm"
      directory: "/"
      schedule:
          interval: "weekly"
          day: "monday"
          time: "09:00"
          timezone: "UTC"
      open-pull-requests-limit: 5
      labels:
          - "dependencies"
          - "automated"
      ignore:
          # Locked to v4.x because v6 requires vite@^8, while
          # @storybook/react-vite@10.x caps at vite@^7. Revisit when
          # Storybook supports Vite 8 OR when we drop Storybook.
          - dependency-name: "@vitejs/plugin-react"
            update-types: ["version-update:semver-major"]
          # Major bump 15→17 includes breaking changes to ESLint flat-config
          # globals object. Hold until we audit the impact.
          - dependency-name: "globals"
            update-types: ["version-update:semver-major"]
      groups:
          # Group all keycloakify-related bumps together — they often need
          # 'npx keycloakify update-kc-gen' run after, so reviewing them as
          # one PR is cleaner than three separate PRs.
          keycloakify:
              patterns:
                  - "keycloakify"
                  - "keycloakify-*"
                  - "@keycloakify/*"

    # Java SPI module — Keycloak provider/jakarta-rs versions
    - package-ecosystem: "maven"
      directory: "/spi"
      schedule:
          interval: "weekly"
          day: "monday"
          time: "09:00"
          timezone: "UTC"
      open-pull-requests-limit: 3
      labels:
          - "dependencies"
          - "automated"
          - "java"
      ignore:
          # Keycloak 26 still ships JAX-RS 3.x; bumping to 4.0 breaks
          # the provided runtime. Revisit when Keycloak upgrades.
          - dependency-name: "jakarta.ws.rs:jakarta.ws.rs-api"
            update-types: ["version-update:semver-major"]

    # GitHub Actions workflow files
    - package-ecosystem: "github-actions"
      directory: "/"
      schedule:
          interval: "weekly"
          day: "monday"
          time: "09:00"
          timezone: "UTC"
      open-pull-requests-limit: 5
      labels:
          - "dependencies"
          - "automated"
          - "ci"
