# Admin-console i18n for the Theme Config UiTabProvider tab.
#
# Keycloak's admin UI loads messages from /resources/{realm}/admin/{locale}.
# That endpoint calls ClasspathThemeResourceProviderFactory.getMessages("messages", locale),
# which resolves to this file (theme-resources/messages/messages_{locale}.properties in the JAR).
#
# The ViewHeader component in the admin UI performs:
#   {!i18n.exists(titleKey) ? titleKey : t(titleKey)}
# where titleKey = UiTabProviderFactory.getId() = "theme-config".
#
# Without this file, the tab label shows the raw provider id: "theme-config".
# With this file, Keycloak resolves the key and renders: "Theme Config".
theme-config=Theme Config
